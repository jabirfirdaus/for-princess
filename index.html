<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minta Maaf Untuk Kamu 💕</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Cute Cat Elements -->
        <div class="cat cat-top-left">
            <div class="cat-head">
                <div class="cat-ear ear-left"></div>
                <div class="cat-ear ear-right"></div>
                <div class="cat-eye eye-left"></div>
                <div class="cat-eye eye-right"></div>
                <div class="cat-nose"></div>
                <div class="cat-mouth"></div>
            </div>
        </div>

        <div class="cat cat-top-right">
            <div class="cat-head">
                <div class="cat-ear ear-left"></div>
                <div class="cat-ear ear-right"></div>
                <div class="cat-eye eye-left"></div>
                <div class="cat-eye eye-right"></div>
                <div class="cat-nose"></div>
                <div class="cat-mouth"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <div class="heart-decoration">💕</div>
            
            <h1 class="title">Minta Maaf Nih... 🥺</h1>
            
            <div class="message-box">
                <p class="apology-message" id="message">
                    Princess Bilqis Inayatuz Zahwa,<br><br>
                    Andika minta maaf karena membuat princess yang imut lucu cantik pinter tinggi mancung wangi baik hati dan tidak sombong menjadi kesal dan nangis. 😭<br><br>
                    Mohon dimaafkan yaa 🤗🤗
                </p>
            </div>

            <div class="question">
                <h2>Dimaafkan tidak? 🥺💕</h2>
            </div>

            <!-- Buttons -->
            <div class="button-container">
                <button class="btn btn-yes" id="yesBtn">IYAA ✨</button>
                <button class="btn btn-no" id="noBtn">TIDAK 😤</button>
            </div>
        </div>

        <!-- Cute Cat Bottom -->
        <div class="cat cat-bottom">
            <div class="cat-head">
                <div class="cat-ear ear-left"></div>
                <div class="cat-ear ear-right"></div>
                <div class="cat-eye eye-left"></div>
                <div class="cat-eye eye-right"></div>
                <div class="cat-nose"></div>
                <div class="cat-mouth"></div>
            </div>
        </div>

        <!-- Confetti Container -->
        <div id="confetti-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
